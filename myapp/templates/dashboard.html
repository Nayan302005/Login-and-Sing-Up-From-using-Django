<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 10px;
        }

        button {
            padding: 10px 20px;
            background: #e74a3b;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #c0392b;
        }
    </style>

</head>
<body>

<div class="card">
    <h2>Hello {{ name }}</h2>
    <p>Welcome to Dashboard</p>

    <a href="{% url 'logout' %}">
        <button>Logout</button>
    </a>
</div>

</body>
</html>
